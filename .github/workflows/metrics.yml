name: GitHub Metrics

on:
  schedule:
    - cron: "0 */8 * * *"  # Every 8 hours
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Kevin3599
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/Los_Angeles
          config_order: base.header, base.activity, base.community, base.repositories, languages, achievements, habits, activity

          # Languages breakdown
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_limit: 8
          plugin_languages_threshold: 0%
          plugin_languages_colors: github
          plugin_languages_details: percentage, bytes-size

          # Achievements / rating
          plugin_achievements: yes
          plugin_achievements_threshold: B
          plugin_achievements_limit: 0
          plugin_achievements_display: compact

          # Recent activity (commits, PRs, issues)
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_activity_filter: all

          # Coding habits
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes

          # Output
          filename: metrics.svg
          output_action: commit
          committer_branch: main
          committer_message: "chore: update metrics [skip ci]"
